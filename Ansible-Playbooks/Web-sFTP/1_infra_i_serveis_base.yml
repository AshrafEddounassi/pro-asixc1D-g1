---
# ==============================================================================
# PART 1: DESPLEGAMENT DE LA INSTÀNCIA I IP ELÀSTICA A AWS (LOCALHOST)
# ==============================================================================
- name: Provisionar Infraestructura i IP Elàstica a AWS des de Zero
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Pujar la clau pública a AWS Key Pairs
      amazon.aws.ec2_key:
        name: "innovateadmin_key_pair"
        key_material: "{{ lookup('file', './innovateadmin_key.pub') }}"
        region: "us-east-1"

    - name: Crear el Security Group amb els ports del projecte
      amazon.aws.ec2_security_group:
        name: "innovatetech-web-sftp-sg"
        description: "SG per a NGINX (80) i SFTP (2222)"
        region: "us-east-1"
        rules:
          - proto: tcp
            from_port: 22
            to_port: 22
            cidr_ip: "0.0.0.0/0"  # SSH Administració
          - proto: tcp
            from_port: 80
            to_port: 80
            cidr_ip: "0.0.0.0/0"  # Web Pública
          - proto: tcp
            from_port: 2222
            to_port: 2222
            cidr_ip: "0.0.0.0/0"  # SFTP/LDAP Usuaris
      register: sg_out

    - name: Buscar la darrera AMI oficial d'Ubuntu 24.04 LTS
      amazon.aws.ec2_ami_info:
        region: "us-east-1"
        owners: "099720109477"  # Canonical
        filters:
          name: "ubuntu/images/hvm-ssd-gp3/ubuntu-noble-24.04-amd64-server-*"
      register: ami_out

    - name: Aixecar la instància EC2 t2.micro (Vinculada a la ID del SG)
      amazon.aws.ec2_instance:
        name: "InnovateTech-WebServer"
        key_name: "innovateadmin_key_pair"
        security_groups: ["{{ sg_out.group_id }}"]
        instance_type: "t2.micro"
        image_id: "{{ ami_out.images[-1].image_id }}"
        region: "us-east-1"
        wait: true
      register: ec2_out

    - name: Sol·licitar i associar una IP Elàstica (EIP) a la instància
      amazon.aws.ec2_eip:
        device_id: "{{ ec2_out.instances[0].instance_id }}"  # Modificat per compatibilitat de versió
        region: "us-east-1"
        state: present
      register: eip_out

    - name: Afegir la IP Elàstica dinàmicament a l'inventari d'Ansible
      ansible.builtin.add_host:
        name: "{{ eip_out.public_ip }}"
        groups: project_server

    - name: Guardar la IP Elàstica al fitxer hosts.ini local
      ansible.builtin.copy:
        dest: "./hosts.ini"
        content: |
          [project_server]
          {{ eip_out.public_ip }}

    - name: Esperar que el port SSH de la IP Elàstica estigui actiu
      ansible.builtin.wait_for:
        host: "{{ eip_out.public_ip }}"
        port: 22
        timeout: 300

# ==============================================================================
# PART 2: CONFIGURACIÓ DE SEGURETAT, USUARIS I SERVEIS BASE
# ==============================================================================
- name: Habilitar seguretat SSH, Crear Administrador i Serveis
  hosts: project_server
  become: true
  remote_user: ubuntu
  vars:
    ansible_ssh_private_key_file: "./innovateadmin_key"
  tasks:
    - name: Desactivar el tallafocs local UFW d'Ubuntu per evitar Timeouts
      ansible.builtin.shell: ufw disable
      changed_when: true

    - name: Crear el nou usuari administrador del sistema
      ansible.builtin.user:
        name: innovateadmin
        shell: /bin/bash
        groups: sudo
        append: true

    - name: Configurar permisos de sudo sense contrasenya per a innovateadmin
      ansible.builtin.copy:
        dest: /etc/sudoers.d/innovateadmin
        content: "innovateadmin ALL=(ALL) NOPASSWD:ALL"
        mode: '0440'

    - name: Injectar la clau pública SSH per al nou usuari administrador
      ansible.posix.authorized_key:
        user: innovateadmin
        state: present
        key: "{{ lookup('file', './innovateadmin_key.pub') }}"

    - name: Forçar que SSH només accepti claus privades i desactivem el root
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
      loop:
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
        - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication yes' }
      notify: Reiniciar SSH

    - name: Actualitzar l'índex de paquets del sistema APT
      ansible.builtin.apt:
        update_cache: true

    - name: Instal·lar NGINX, PHP i ProFTPd com a mòduls LDAP i CRYPTO
      ansible.builtin.apt:
        name:
          - nginx
          - proftpd-mod-ldap
          - proftpd-mod-crypto
          - php-fpm
          - php-mysql
        state: present

    - name: Configurar l'encaminament de PHP dins de NGINX
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/default
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              root /var/www/html;
              index index.php index.html index.htm;
              server_name _;

              location / {
                  try_files $uri $uri/ =404;
              }

              location ~ \.php$ {
                  include snippets/fastcgi-php.conf;
                  fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
              }
          }
      notify: Reiniciar NGINX

    - name: Forçar activació de mod_sftp i mod_ldap a la configuració d'Ubuntu
      ansible.builtin.shell: |
        sed -i 's/^#\s*LoadModule mod_sftp.c/LoadModule mod_sftp.c/' /etc/proftpd/modules.conf
        sed -i 's/^#\s*LoadModule mod_ldap.c/LoadModule mod_ldap.c/' /etc/proftpd/modules.conf
      changed_when: true

    - name: Crear fitxer de configuració SFTP enllaçat al LDAP del nou laboratori
      ansible.builtin.copy:
        dest: /etc/proftpd/conf.d/sftp_ldap.conf
        content: |
          <Global>
              <IfModule mod_ldap.c>
                  LDAPServer 54.174.227.251
                  LDAPBindDN "cn=admin,dc=innovatetech,dc=cat" "pirineus"
                  LDAPUsers "dc=innovatetech,dc=cat"
                  LDAPAuthBinds on
                  LDAPLog /var/log/proftpd/ldap.log
                  
                  LDAPDefaultUID 1000
                  LDAPDefaultGID 1000
                  LDAPForceDefaultUID on
                  LDAPForceDefaultGID on
              </IfModule>
          </Global>

          <VirtualHost 0.0.0.0>
              SFTPEngine on
              Port 2222
              SFTPLog /var/log/proftpd/sftp.log
              SFTPHostKey /etc/ssh/ssh_host_rsa_key
              SFTPAuthMethods password

              AuthOrder mod_ldap.c
              RequireValidShell off
              CreateHome on
          </VirtualHost>
      notify: Reiniciar ProFTPd

  handlers:
    - name: Reiniciar NGINX
      ansible.builtin.systemd: name=nginx state=restarted
    - name: Reiniciar ProFTPd
      ansible.builtin.systemd: name=proftpd state=restarted
    - name: Reiniciar SSH
      ansible.builtin.systemd: name=ssh state=restarted
