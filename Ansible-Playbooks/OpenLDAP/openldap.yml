---
- name: Configurar OpenLDAP
  hosts: ldap_server
  become: true
  gather_facts: true

  vars:
    ldap_domain: innovatetech.cat
    ldap_base_dn: dc=innovatetech,dc=cat
    ldap_admin_pass: "@ITB2026"
    ldap_ftp_pass: "@FTP2026"

  tasks:

    - name: Actualizar repositorios
      apt:
        update_cache: true

    # 🔥 IMPORTANTE: preconfiguración ANTES de instalar

    - name: Configurar dominio LDAP
      debconf:
        name: slapd
        question: slapd/domain
        value: "{{ ldap_domain }}"
        vtype: string

    - name: Configurar organización
      debconf:
        name: slapd
        question: shared/organization
        value: "InnovateTech"
        vtype: string

    - name: Password admin LDAP (1)
      debconf:
        name: slapd
        question: slapd/password1
        value: "{{ ldap_admin_pass }}"
        vtype: password

    - name: Password admin LDAP (2)
      debconf:
        name: slapd
        question: slapd/password2
        value: "{{ ldap_admin_pass }}"
        vtype: password

    - name: Evitar configuración interactiva
      debconf:
        name: slapd
        question: slapd/no_configuration
        value: "false"
        vtype: boolean

    - name: Instalar OpenLDAP
      apt:
        name:
          - slapd
          - ldap-utils
        state: present

    - name: Habilitar servicio slapd
      service:
        name: slapd
        state: restarted
        enabled: true

    # 🔑 NUEVA SECCIÓN: Creación del usuario para ProFTPD sin permisos de admin

    - name: Crear archivo LDIF para el usuario ftpadmin
      copy:
        dest: /tmp/ftpadmin.ldif
        content: |
          dn: uid=ftpadmin,{{ ldap_base_dn }}
          objectClass: top
          objectClass: person
          objectClass: organizationalPerson
          objectClass: inetOrgPerson
          cn: ftpadmin
          sn: ftpadmin
          uid: ftpadmin
          userPassword: {{ ldap_ftp_pass }}
        mode: '0600'

    - name: Insertar el usuario ftpadmin en el directorio LDAP
      shell: |
        ldapadd -x -D "cn=admin,{{ ldap_base_dn }}" -w "{{ ldap_admin_pass }}" -f /tmp/ftpadmin.ldif
      register: ldap_result
      failed_when: "ldap_result.rc != 0 and 'Already exists' not in ldap_result.stderr"
      changed_when: "'Already exists' not in ldap_result.stderr"
